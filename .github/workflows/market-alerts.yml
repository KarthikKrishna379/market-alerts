name: Market Alerts

on:
  schedule:
    # Run every day at 9:30 AM IST
    - cron: '*/5 * * * *'  # Monday to Friday only
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
  
jobs:
  send-alerts:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt in early to Node.js 24
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run market alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STOCK_TICKERS: "AAPL,GOOGL,MSFT,TSLA,AMZN"
        run: python market_metrics.py
